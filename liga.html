<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Liga MX Hub</title>
    <style>
        :root { 
            --bg: #0f172a; 
            --card: #1e293b; 
            --accent: #10b981; 
            --text: #f8fafc; 
            --grey: #94a3b8;
            --border: #334155;
            --red: #ef4444;
            --gold: #fbbf24;
        }
        
        body { 
            font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); 
            margin: 0; padding-bottom: 80px; -webkit-font-smoothing: antialiased;
        }

        .header { 
            position: sticky; top: 0; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px);
            padding: 40px 20px 15px 20px; border-bottom: 1px solid var(--border); 
            display: flex; justify-content: space-between; align-items: center; z-index: 100;
        }
        .header h1 { margin: 0; font-size: 28px; font-weight: 800; display: flex; align-items: center; gap: 8px;}
        .header h1 span { color: var(--accent); }

        .view { display: none; padding: 15px; }
        .active-view { display: block; }
        .section-header { color: var(--grey); font-size: 14px; font-weight: 600; text-transform: uppercase; margin: 15px 0 10px 5px; }

        /* Standings Table */
        .table-card { background: var(--card); border-radius: 16px; overflow: hidden; border: 1px solid var(--border); }
        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 14px; }
        th { background: #0f172a; color: var(--grey); font-weight: 600; padding: 12px 10px; font-size: 12px; text-transform: uppercase; }
        td { padding: 12px 10px; border-bottom: 1px solid var(--border); font-weight: 500;}
        tr:last-child td { border-bottom: none; }
        .pos { width: 20px; text-align: center; color: var(--grey); }
        .team-cell { display: flex; align-items: center; gap: 8px; font-weight: 600; }
        .pts { font-weight: 800; color: var(--accent); }

        /* Qualification Colors */
        .pos-direct { color: var(--accent); font-weight: 700; }
        .pos-playin { color: #f59e0b; font-weight: 700; }

        /* Bottom Nav */
        .nav { position: fixed; bottom: 0; width: 100%; background: rgba(30, 41, 59, 0.95); backdrop-filter: blur(10px); display: flex; justify-content: space-around; padding: 12px 0 25px 0; border-top: 1px solid var(--border); z-index: 100; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: var(--grey); font-size: 11px; gap: 4px; font-weight: 600; cursor: pointer;}
        .nav-item.active { color: var(--accent); }
        .nav-icon { font-size: 22px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>⚽ Liga<span>MX</span></h1>
        <div style="background:var(--card); padding:8px 12px; border-radius:20px; font-size:12px; font-weight:bold;">Clausura</div>
    </div>

    <div id="standings" class="view active-view">
        <div class="section-header">Live General Table</div>
        <div class="table-card">
            <table>
                <thead>
                    <tr><th class="pos">#</th><th>Club</th><th title="Played">P</th><th title="Goal Difference">GD</th><th title="Points" class="pts">Pts</th></tr>
                </thead>
                <tbody id="tableBody">
                    </tbody>
            </table>
        </div>
        <p style="font-size: 12px; color: var(--grey); margin-top: 15px; text-align: center;">
            <span style="color:var(--accent)">●</span> Direct Liguilla &nbsp;&nbsp; <span style="color:#f59e0b">●</span> Play-In
        </p>
    </div>

    <div class="nav">
        <div class="nav-item active">
            <span class="nav-icon">📊</span><span>Standings</span>
        </div>
    </div>

    <script>
        // THE DATA LAYER
        // I pulled these exact stats from the Google Search results in your screen recording.
        // If you ever get a real Sports API, you would replace this array with a live fetch() call.
        const ligaMxData = [
            { rank: 1, name: "Guadalajara", emoji: "🐐", played: 13, gd: "+10", points: 31 },
            { rank: 2, name: "Cruz Azul", emoji: "🚂", played: 13, gd: "+8", points: 27 },
            { rank: 3, name: "Toluca", emoji: "😈", played: 13, gd: "+7", points: 25 },
            { rank: 4, name: "Monterrey", emoji: "⛰️", played: 12, gd: "+4", points: 24 },
            { rank: 5, name: "Pumas UNAM", emoji: "🐾", played: 13, gd: "+6", points: 20 },
            { rank: 6, name: "Club América", emoji: "🦅", played: 13, gd: "+5", points: 20 },
            { rank: 7, name: "Atlas", emoji: "🦊", played: 13, gd: "+3", points: 18 },
            { rank: 8, name: "Tigres UANL", emoji: "🐅", played: 13, gd: "+5", points: 17 },
            { rank: 9, name: "Necaxa", emoji: "⚡", played: 13, gd: "+2", points: 16 },
            { rank: 10, name: "Juárez", emoji: "🐎", played: 13, gd: "+1", points: 16 },
            { rank: 11, name: "León", emoji: "🦁", played: 13, gd: "-2", points: 15 }
        ];

        // RENDER FUNCTION
        function buildTable() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';

            ligaMxData.forEach(team => {
                // Determine Liguilla color coding based on rank
                let rankClass = "pos";
                if (team.rank <= 6) rankClass = "pos pos-direct";
                else if (team.rank <= 10) rankClass = "pos pos-playin";

                const row = `
                    <tr>
                        <td class="${rankClass}">${team.rank}</td>
                        <td><div class="team-cell">${team.emoji} ${team.name}</div></td>
                        <td>${team.played}</td>
                        <td>${team.gd}</td>
                        <td class="pts">${team.points}</td>
                    </tr>
                `;
                tbody.innerHTML += row;
            });
        }

        // Initialize table on load
        buildTable();
    </script>
</body>
</html>
