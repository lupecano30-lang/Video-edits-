<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iOS Alarms</title>
    <style>
        :root { 
            --bg: #000000; 
            --surface: #1c1c1e; 
            --orange: #ff9f0a; 
            --text: #ffffff; 
            --grey: #8e8e93;
            --divider: #38383a;
            --green: #34c759;
            --red: #ff453a;
        }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background: var(--bg); color: var(--text); margin: 0; padding-bottom: 90px;
            -webkit-font-smoothing: antialiased;
        }

        /* --- Views --- */
        .view { display: none; min-height: 100vh; flex-direction: column; }
        .active-view { display: flex; }

        /* --- Main Header --- */
        .header-main { padding: 40px 16px 10px 16px; }
        .top-actions { display: flex; justify-content: space-between; margin-bottom: 10px; }
        .top-actions span { color: var(--orange); font-size: 17px; cursor: pointer; }
        .top-actions .plus { font-size: 30px; font-weight: 300; line-height: 20px; }
        h1 { margin: 0; font-size: 34px; font-weight: 700; letter-spacing: -0.5px; }

        /* --- Alarm List --- */
        .section-title { color: var(--text); font-size: 18px; font-weight: 600; padding: 10px 16px; margin-top: 10px; border-bottom: 0.5px solid var(--divider); }
        
        .alarm-list { display: flex; flex-direction: column; }
        .alarm-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px 12px 0; margin-left: 16px; border-bottom: 0.5px solid var(--divider); cursor: pointer;}
        .alarm-item:last-child { border-bottom: none; }
        
        .time-display { font-size: 56px; font-weight: 200; letter-spacing: -1.5px; color: var(--text); }
        .time-display span { font-size: 24px; font-weight: 300; }
        .alarm-label { color: var(--grey); font-size: 14px; margin-top: -5px; }

        /* --- iOS Toggle Switch --- */
        .switch { position: relative; display: inline-block; width: 51px; height: 31px; flex-shrink: 0; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #39393d; transition: .3s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 27px; width: 27px; left: 2px; bottom: 2px; background-color: white; transition: .3s; border-radius: 50%; box-shadow: 0 3px 8px rgba(0,0,0,0.15); }
        input:checked + .slider { background-color: var(--green); }
        input:checked + .slider:before { transform: translateX(20px); }

        /* --- Edit/Add View --- */
        .header-edit { display: flex; justify-content: space-between; align-items: center; padding: 20px 16px; background: #1c1c1e; position: sticky; top: 0; z-index: 10; border-bottom: 0.5px solid #000; }
        .header-edit span { color: var(--orange); font-size: 17px; cursor: pointer; }
        .header-edit .title { color: var(--text); font-weight: 600; font-size: 17px; }
        
        .time-picker-container { display: flex; justify-content: center; padding: 30px 0; background: #1c1c1e; margin-bottom: 20px; }
        input[type="time"] { background: #2c2c2e; border: none; color: white; font-size: 40px; padding: 10px 20px; border-radius: 12px; outline: none; font-weight: 400; }

        .settings-group { background: var(--surface); border-radius: 10px; margin: 0 16px 20px 16px; overflow: hidden; }
        .setting-row { display: flex; justify-content: space-between; align-items: center; padding: 14px 16px; border-bottom: 0.5px solid var(--divider); color: var(--text); font-size: 17px; }
        .setting-row:last-child { border-bottom: none; }
        .setting-val { color: var(--grey); display: flex; align-items: center; gap: 8px; cursor: pointer; }
        .setting-val input { background: none; border: none; color: var(--grey); text-align: right; font-size: 17px; outline: none; width: 150px; }

        .btn-delete { background: var(--surface); color: var(--red); border: none; width: calc(100% - 32px); margin: 0 16px; padding: 16px; border-radius: 10px; font-size: 17px; cursor: pointer; }

        /* --- Repeat View --- */
        .check-icon { color: var(--orange); font-weight: bold; display: none; }
        .selected .check-icon { display: block; }

        /* --- Bottom Nav --- */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: rgba(28, 28, 30, 0.9); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); display: flex; justify-content: space-around; padding: 10px 0 25px 0; border-top: 0.5px solid var(--divider); z-index: 100; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: var(--grey); font-size: 10px; gap: 4px; }
        .nav-item.active { color: var(--orange); }
        .nav-icon { font-size: 24px; }

        /* --- Ringing Modal --- */
        #ringModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; flex-direction: column; justify-content: center; align-items: center; }
        .ring-time { font-size: 80px; font-weight: 200; margin-bottom: 10px; }
        .ring-label { font-size: 20px; color: var(--grey); margin-bottom: 50px; }
        .btn-stop { background: var(--orange); color: #000; border: none; padding: 20px 60px; border-radius: 40px; font-size: 24px; font-weight: 600; cursor: pointer; }
    </style>
</head>
<body>

    <div id="view-main" class="view active-view">
        <div class="header-main">
            <div class="top-actions">
                <span>Edit</span>
                <span class="plus" onclick="openEdit(null)">+</span>
            </div>
            <h1>Alarms</h1>
        </div>
        
        <div class="section-title">Other</div>
        <div class="alarm-list" id="alarmContainer">
            </div>
    </div>

    <div id="view-edit" class="view" style="background: #000;">
        <div class="header-edit">
            <span onclick="showView('view-main')">Cancel</span>
            <div class="title" id="editTitle">Edit Alarm</div>
            <span style="font-weight: 600;" onclick="saveAlarm()">Save</span>
        </div>

        <div class="time-picker-container">
            <input type="time" id="editTime" value="06:00">
        </div>

        <div class="settings-group">
            <div class="setting-row" onclick="showView('view-repeat')">
                <span>Repeat</span>
                <span class="setting-val"><span id="lblRepeat">Never</span> ❯</span>
            </div>
            <div class="setting-row">
                <span>Label</span>
                <span class="setting-val"><input type="text" id="editLabel" placeholder="Alarm"></span>
            </div>
            <div class="setting-row">
                <span>Sound</span>
                <span class="setting-val">Radar ❯</span>
            </div>
            <div class="setting-row">
                <span>Snooze</span>
                <label class="switch"><input type="checkbox" id="editSnooze" checked><span class="slider"></span></label>
            </div>
        </div>

        <button class="btn-delete" id="deleteBtn" onclick="deleteAlarm()">Delete Alarm</button>
    </div>

    <div id="view-repeat" class="view" style="background: #1c1c1e;">
        <div class="header-edit">
            <span onclick="showView('view-edit')" style="display:flex; align-items:center;">❮ Back</span>
            <div class="title">Repeat</div>
            <span style="width: 40px;"></span>
        </div>
        <div class="settings-group" style="margin-top: 20px;">
            <div class="setting-row" onclick="toggleRepeat(this, 'Sunday')"><span>Every Sunday</span><span class="check-icon">✓</span></div>
            <div class="setting-row" onclick="toggleRepeat(this, 'Monday')"><span>Every Monday</span><span class="check-icon">✓</span></div>
            <div class="setting-row" onclick="toggleRepeat(this, 'Tuesday')"><span>Every Tuesday</span><span class="check-icon">✓</span></div>
            <div class="setting-row" onclick="toggleRepeat(this, 'Wednesday')"><span>Every Wednesday</span><span class="check-icon">✓</span></div>
            <div class="setting-row" onclick="toggleRepeat(this, 'Thursday')"><span>Every Thursday</span><span class="check-icon">✓</span></div>
            <div class="setting-row" onclick="toggleRepeat(this, 'Friday')"><span>Every Friday</span><span class="check-icon">✓</span></div>
            <div class="setting-row" onclick="toggleRepeat(this, 'Saturday')"><span>Every Saturday</span><span class="check-icon">✓</span></div>
        </div>
    </div>

    <div id="ringModal">
        <div class="ring-time" id="ringTimeStr">12:30</div>
        <div class="ring-label" id="ringLabelStr">Alarm</div>
        <button class="btn-stop" onclick="stopAlarm()">Stop</button>
    </div>

    <div class="bottom-nav">
        <div class="nav-item"><span class="nav-icon">🌐</span><span>World Clock</span></div>
        <div class="nav-item active"><span class="nav-icon">⏰</span><span>Alarms</span></div>
        <div class="nav-item"><span class="nav-icon">⏱️</span><span>Stopwatch</span></div>
        <div class="nav-item"><span class="nav-icon">⏲️</span><span>Timers</span></div>
    </div>

    <script>
        // Default alarms mimicking your screenshot
        let alarms = JSON.parse(localStorage.getItem('iosAlarms')) || [
            { id: 1, time: "00:30", label: "Emina medicine", repeat: "every day", active: true },
            { id: 2, time: "01:30", label: "Remove towel from jar", repeat: "every day", active: true },
            { id: 3, time: "03:54", label: "Emina medicine", repeat: "every day", active: true },
            { id: 4, time: "05:01", label: "Call to pick up another hose...", repeat: "every day", active: true }
        ];

        let editingId = null;
        let activeAudio = null;
        const alarmSound = "https://actions.google.com/sounds/v1/alarms/bugle_tune.ogg";

        function showView(viewId) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active-view'));
            document.getElementById(viewId).classList.add('active-view');
        }

        // Format military time (14:30) to AM/PM (2:30 AM)
        function formatTimeDisplay(timeStr) {
            let [h, m] = timeStr.split(':');
            h = parseInt(h);
            const ampm = h >= 12 ? 'PM' : 'AM';
            h = h % 12 || 12; 
            return { time: `${h}:${m}`, ampm };
        }

        function renderAlarms() {
            const container = document.getElementById('alarmContainer');
            container.innerHTML = '';
            
            alarms.sort((a, b) => a.time.localeCompare(b.time)).forEach(alarm => {
                const { time, ampm } = formatTimeDisplay(alarm.time);
                
                container.innerHTML += `
                    <div class="alarm-item">
                        <div style="flex-grow: 1;" onclick="openEdit(${alarm.id})">
                            <div class="time-display" style="color: ${alarm.active ? 'var(--text)' : 'var(--grey)'}">${time} <span>${ampm}</span></div>
                            <div class="alarm-label">${alarm.label}${alarm.repeat ? ', ' + alarm.repeat : ''}</div>
                        </div>
                        <label class="switch">
                            <input type="checkbox" ${alarm.active ? 'checked' : ''} onchange="toggleActive(${alarm.id}, this.checked)">
                            <span class="slider"></span>
                        </label>
                    </div>
                `;
            });
            localStorage.setItem('iosAlarms', JSON.stringify(alarms));
        }

        function toggleActive(id, isActive) {
            const alarm = alarms.find(a => a.id === id);
            if(alarm) alarm.active = isActive;
            renderAlarms();
        }

        function openEdit(id) {
            editingId = id;
            if (id) {
                // Editing existing
                const alarm = alarms.find(a => a.id === id);
                document.getElementById('editTitle').innerText = "Edit Alarm";
                document.getElementById('editTime').value = alarm.time;
                document.getElementById('editLabel').value = alarm.label;
                document.getElementById('lblRepeat').innerText = alarm.repeat || "Never";
                document.getElementById('deleteBtn').style.display = "block";
            } else {
                // Creating new
                document.getElementById('editTitle').innerText = "Add Alarm";
                const now = new Date();
                document.getElementById('editTime').value = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
                document.getElementById('editLabel').value = "Alarm";
                document.getElementById('lblRepeat').innerText = "Never";
                document.getElementById('deleteBtn').style.display = "none";
            }
            showView('view-edit');
        }

        function saveAlarm() {
            const timeVal = document.getElementById('editTime').value;
            const labelVal = document.getElementById('editLabel').value || "Alarm";
            const repeatVal = document.getElementById('lblRepeat').innerText;

            if (editingId) {
                const alarm = alarms.find(a => a.id === editingId);
                alarm.time = timeVal; alarm.label = labelVal; alarm.repeat = repeatVal === "Never" ? "" : repeatVal;
            } else {
                alarms.push({ id: Date.now(), time: timeVal, label: labelVal, repeat: repeatVal === "Never" ? "" : repeatVal, active: true });
            }
            
            renderAlarms();
            showView('view-main');
        }

        function deleteAlarm() {
            alarms = alarms.filter(a => a.id !== editingId);
            renderAlarms();
            showView('view-main');
        }

        function toggleRepeat(el, day) {
            el.classList.toggle('selected');
            document.getElementById('lblRepeat').innerText = "Custom";
        }

        // --- ALARM TRIGGER ENGINE ---
        setInterval(() => {
            const now = new Date();
            const currentStr = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
            // Only trigger exactly at 00 seconds so it doesn't ring 60 times in one minute
            if (now.getSeconds() === 0) {
                const triggeringAlarm = alarms.find(a => a.active && a.time === currentStr);
                if (triggeringAlarm) triggerRinging(triggeringAlarm);
            }
        }, 1000);

        function triggerRinging(alarm) {
            const { time, ampm } = formatTimeDisplay(alarm.time);
            document.getElementById('ringTimeStr').innerText = `${time} ${ampm}`;
            document.getElementById('ringLabelStr').innerText = alarm.label;
            document.getElementById('ringModal').style.display = 'flex';
            
            activeAudio = new Audio(alarmSound);
            activeAudio.loop = true;
            activeAudio.play().catch(e => console.log("Audio blocked"));
        }

        function stopAlarm() {
            document.getElementById('ringModal').style.display = 'none';
            if(activeAudio) { activeAudio.pause(); activeAudio.currentTime = 0; }
        }

        renderAlarms();
    </script>
</body>
</html>
