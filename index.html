<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fitness Setup</title>
    <style>
        :root { --bg: #0b0e14; --card: #1c222d; --blue: #4facfe; --text: #ffffff; --grey: #8e8e93; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; }
        
        /* Onboarding Screens */
        .setup-screen { display: none; padding: 30px 20px; min-height: 100vh; flex-direction: column; }
        .active-setup { display: flex; }
        
        h2 { font-size: 24px; margin-bottom: 10px; }
        p { color: var(--grey); margin-bottom: 30px; }

        /* Option Cards */
        .option-card { background: var(--card); border: 2px solid transparent; border-radius: 15px; padding: 20px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: 0.2s; }
        .option-card.selected { border-color: var(--blue); background: #242c3d; }
        .radio-dot { width: 20px; height: 20px; border: 2px solid var(--grey); border-radius: 50%; }
        .selected .radio-dot { border-color: var(--blue); background: var(--blue); box-shadow: inset 0 0 0 4px var(--card); }

        /* Diet Grid */
        .diet-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .diet-card { background: var(--card); border-radius: 15px; overflow: hidden; border: 2px solid transparent; text-align: left; }
        .diet-card img { width: 100%; height: 100px; object-fit: cover; }
        .diet-card.selected { border-color: var(--blue); }
        .diet-info { padding: 10px; }
        .diet-info small { color: var(--grey); font-size: 11px; }

        .btn-next { background: var(--blue); color: white; border: none; padding: 18px; border-radius: 30px; font-weight: 700; margin-top: auto; font-size: 16px; }
    </style>
</head>
<body>

    <div id="step1" class="setup-screen active-setup">
        <h2>How motivated are you?</h2>
        <p>This helps us set the right pace for you.</p>
        
        <div class="option-card" onclick="select(this, 'step1')">
            <div><strong>Ready to tackle anything</strong><br><small style="color:var(--grey)">Prefer big changes</small></div>
            <div class="radio-dot"></div>
        </div>
        <div class="option-card" onclick="select(this, 'step1')">
            <div><strong>Willing to give it a go</strong><br><small style="color:var(--grey)">Prefer moderate changes</small></div>
            <div class="radio-dot"></div>
        </div>

        <button class="btn-next" onclick="nextStep(2)">Continue</button>
    </div>

    <div id="step2" class="setup-screen">
        <h2>Which diet plan do you prefer?</h2>
        <div class="diet-grid">
            <div class="diet-card" onclick="select(this, 'diet')">
                <img src="https://images.unsplash.com/photo-1490645935967-10de6ba17061?auto=format&fit=crop&w=200&q=80">
                <div class="diet-info"><strong>Balanced</strong><br><small>Thoughtful portions</small></div>
            </div>
            <div class="diet-card" onclick="select(this, 'diet')">
                <img src="https://images.unsplash.com/photo-1532550907401-a500c9a57435?auto=format&fit=crop&w=200&q=80">
                <div class="diet-info"><strong>High Protein</strong><br><small>Protein-first meals</small></div>
            </div>
            <div class="diet-card" onclick="select(this, 'diet')">
                <img src="https://images.unsplash.com/photo-1547592166-23ac45744acd?auto=format&fit=crop&w=200&q=80">
                <div class="diet-info"><strong>Keto</strong><br><small>Very low carb</small></div>
            </div>
            <div class="diet-card" onclick="select(this, 'diet')">
                <img src="https://images.unsplash.com/photo-1512621776951-a57141f2eefd?auto=format&fit=crop&w=200&q=80">
                <div class="diet-info"><strong>Vegan</strong><br><small>Plants only</small></div>
            </div>
        </div>
        <button class="btn-next" onclick="finish()">Finish Setup</button>
    </div>

    <script>
        function select(el, group) {
            const siblings = group === 'diet' ? '.diet-card' : '.option-card';
            document.querySelectorAll(siblings).forEach(c => c.classList.remove('selected'));
            el.classList.add('selected');
        }

        function nextStep(step) {
            document.querySelectorAll('.setup-screen').forEach(s => s.classList.remove('active-setup'));
            document.getElementById('step' + step).classList.add('active-setup');
        }

        function finish() {
            alert("Setup Complete! Taking you to your personalized dashboard...");
            // In a real app, this would save to a database and redirect
            window.location.reload(); 
        }
    </script>
</body>
</html>
