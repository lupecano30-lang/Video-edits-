<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fitness Pro All-In-One</title>
    <style>
        :root { --bg: #0b0e14; --card: #1c222d; --blue: #4facfe; --text: #ffffff; --grey: #8e8e93; --green: #34c759; --red: #ff3b30; --orange: #ffcc00; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; overflow-x: hidden; }
        
        /* Pages & Visibility */
        .page { display: none; min-height: 100vh; flex-direction: column; padding: 20px; box-sizing: border-box; }
        .active-page { display: flex; }
        
        /* Onboarding Styles */
        .option-card { background: var(--card); border: 2px solid transparent; border-radius: 15px; padding: 18px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
        .option-card.selected { border-color: var(--blue); background: #242c3d; }
        .diet-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .diet-card { background: var(--card); border-radius: 15px; overflow: hidden; border: 2px solid transparent; }
        .diet-card img { width: 100%; height: 80px; object-fit: cover; }
        .diet-card.selected { border-color: var(--blue); }

        /* Dashboard Styles */
        .main-card { background: var(--card); border-radius: 24px; padding: 20px; margin-bottom: 15px; }
        .cal-num { font-size: 32px; font-weight: 800; }
        .bar-bg { background: #2d3446; height: 8px; border-radius: 4px; margin: 10px 0; overflow: hidden; }
        .bar-fill { height: 100%; width: 0%; transition: width 0.5s ease; }
        .diary-row { background: var(--card); padding: 15px; border-radius: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }

        /* Camera View */
        .camera-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 2000; }
        #video-stream { width: 100%; height: 100%; object-fit: cover; }

        /* Navigation */
        .nav { position: fixed; bottom: 0; width: 100%; background: #161b2a; display: none; justify-content: space-around; padding: 15px 0 35px 0; border-top: 1px solid #2d3446; z-index: 500; }
        .plus-btn { background: var(--blue); width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; margin-top: -40px; border: 5px solid var(--bg); }
        .btn-next { background: var(--blue); color: white; border: none; padding: 18px; border-radius: 30px; font-weight: 700; margin-top: auto; }
    </style>
</head>
<body>

    <div id="setup1" class="page active-page">
        <h2>How motivated are you?</h2>
        <div class="option-card" onclick="select(this, 'setup')"><strong>Ready to tackle anything</strong><div class="dot"></div></div>
        <div class="option-card" onclick="select(this, 'setup')"><strong>Willing to give it a go</strong><div class="dot"></div></div>
        <button class="btn-next" onclick="goTo('setup2')">Continue</button>
    </div>

    <div id="setup2" class="page">
        <h2>Choose your diet</h2>
        <div class="diet-grid">
            <div class="diet-card" onclick="select(this, 'diet')"><img src="https://images.unsplash.com/photo-1490645935967-10de6ba17061?w=200"><div style="padding:10px">Balanced</div></div>
            <div class="diet-card" onclick="select(this, 'diet')"><img src="https://images.unsplash.com/photo-1532550907401-a500c9a57435?w=200"><div style="padding:10px">High Protein</div></div>
        </div>
        <button class="btn-next" onclick="finishSetup()">Finish Setup</button>
    </div>

    <div id="dash" class="page">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h1>Today ▾</h1>
            <button onclick="goTo('goals')" style="background:none; border:none; color:var(--blue);">Set Goals</button>
        </div>
        <div class="main-card">
            <div style="display:flex; justify-content:space-between;">
                <div><small>Eaten</small><br><span class="cal-num" id="eaten">0</span></div>
                <div style="text-align:right;"><small>Left</small><br><span class="cal-num" id="left" style="color:var(--blue)">2000</span></div>
            </div>
            <div class="bar-bg"><div id="mainFill" class="bar-fill" style="background:var(--blue)"></div></div>
        </div>
        <h3>Diary</h3>
        <div class="diary-row"><span>🍳 Breakfast</span><button onclick="add(300)" style="color:var(--blue); background:none; border:none;">Log</button></div>
        <div class="diary-row"><span>🍔 Lunch</span><button onclick="add(600)" style="color:var(--blue); background:none; border:none;">Log</button></div>
    </div>

    <div id="goals" class="page">
        <button onclick="goTo('dash')" style="color:var(--blue); border:none; background:none; margin-bottom:20px;">← Back</button>
        <h2>My Goals</h2>
        <div class="option-card"><span>Daily Calories</span><input type="number" id="goalInput" value="2000" oninput="updateGoal()" style="background:none; border:none; color:var(--blue); text-align:right; width:80px; font-size:18px;"></div>
    </div>

    <div id="camView" class="camera-overlay">
        <video id="video-stream" autoplay playsinline></video>
        <button onclick="closeCam()" style="position:absolute; top:20px; left:20px; color:white; background:rgba(0,0,0,0.5); border:none; padding:10px; border-radius:10px;">✕ Close</button>
        <div onclick="snap()" style="position:absolute; bottom:40px; left:50%; transform:translateX(-50%); width:70px; height:70px; border:5px solid white; border-radius:50%;"></div>
    </div>

    <div class="nav" id="mainNav">
        <div onclick="goTo('dash')">🏠</div>
        <div class="plus-btn" onclick="openCam()">+</div>
        <div onclick="goTo('goals')">📊</div>
    </div>

    <script>
        let logs = { eaten: 0, goal: 2000 };

        function select(el, group) {
            const selector = group === 'diet' ? '.diet-card' : '.option-card';
            document.querySelectorAll(selector).forEach(c => c.classList.remove('selected'));
            el.classList.add('selected');
        }

        function goTo(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.getElementById(id).classList.add('active-page');
        }

        function finishSetup() {
            document.getElementById('mainNav').style.display = 'flex';
            goTo('dash');
            localStorage.setItem('setupDone', 'true');
        }

        async function openCam() {
            document.getElementById('camView').style.display = 'block';
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
            document.getElementById('video-stream').srcObject = stream;
        }

        function closeCam() {
            document.getElementById('camView').style.display = 'none';
            const stream = document.getElementById('video-stream').srcObject;
            if(stream) stream.getTracks().forEach(t => t.stop());
        }

        function snap() { alert("Food Scanned! +450 cal"); add(450); closeCam(); }

        function add(amt) {
            logs.eaten += amt;
            updateUI();
        }

        function updateGoal() {
            logs.goal = document.getElementById('goalInput').value;
            updateUI();
        }

        function updateUI() {
            document.getElementById('eaten').innerText = logs.eaten;
            document.getElementById('left').innerText = Math.max(0, logs.goal - logs.eaten);
            document.getElementById('mainFill').style.width = Math.min(100, (logs.eaten / logs.goal * 100)) + "%";
        }

        // Auto-skip setup if done before
        if(localStorage.getItem('setupDone')) { finishSetup(); }
    </script>
</body>
</html>
