<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pulse Monitor</title>
    <style>
        :root { --bg: #050505; --card: #121212; --neon-blue: #00f2ff; --neon-pink: #ff007f; --text: #ffffff; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        .header { width: 100%; padding: 40px 20px 20px; box-sizing: border-box; display: flex; justify-content: space-between; align-items: center; }
        .back-btn { font-size: 24px; color: var(--text); text-decoration: none; }

        /* The Big Pulse Circle */
        .pulse-container { position: relative; width: 280px; height: 280px; margin: 40px 0; display: flex; align-items: center; justify-content: center; }
        .outer-ring { position: absolute; width: 100%; height: 100%; border: 2px solid #222; border-radius: 50%; }
        .glow { position: absolute; width: 200px; height: 200px; background: radial-gradient(circle, rgba(0,242,255,0.2) 0%, transparent 70%); border-radius: 50%; animation: pulse-glow 1.5s infinite; }
        
        .bpm-display { text-align: center; z-index: 10; }
        .bpm-value { font-size: 80px; font-weight: 800; color: var(--neon-blue); text-shadow: 0 0 20px rgba(0,242,255,0.5); }
        .bpm-unit { font-size: 18px; color: var(--grey); letter-spacing: 2px; }

        /* Instructions */
        .status-card { background: var(--card); width: 90%; border-radius: 20px; padding: 25px; box-sizing: border-box; border: 1px solid #222; text-align: center; }
        .instruction { color: #888; font-size: 14px; line-height: 1.6; }

        /* Start Button */
        .measure-btn { margin-top: auto; margin-bottom: 50px; width: 80%; background: linear-gradient(90deg, var(--neon-blue), #7000ff); padding: 18px; border-radius: 40px; border: none; color: white; font-weight: 700; font-size: 18px; box-shadow: 0 10px 20px rgba(0,242,255,0.3); }

        /* Waveform Animation */
        .wave-box { width: 100%; height: 60px; margin-top: 20px; display: flex; align-items: center; justify-content: center; gap: 4px; }
        .bar { width: 4px; height: 10px; background: var(--neon-blue); border-radius: 2px; animation: wave 1s infinite; }

        @keyframes pulse-glow { 0% { transform: scale(0.8); opacity: 0.5; } 50% { transform: scale(1.2); opacity: 0.2; } 100% { transform: scale(0.8); opacity: 0.5; } }
        @keyframes wave { 0%, 100% { height: 10px; } 50% { height: 40px; } }
    </style>
</head>
<body>

    <div class="header">
        <a href="#" class="back-btn">✕</a>
        <h3 style="margin:0; font-weight:400; letter-spacing:1px;">HEART RATE</h3>
        <div style="width:24px;"></div>
    </div>

    <div class="pulse-container">
        <div class="outer-ring"></div>
        <div class="glow" id="glowAnim" style="display:none;"></div>
        <div class="bpm-display">
            <span class="bpm-value" id="bpmVal">--</span><br>
            <span class="bpm-unit">BPM</span>
        </div>
    </div>

    <div class="status-card">
        <p class="instruction" id="statusMsg">Place your finger over the <b>back camera</b> and <b>flash</b> to start measuring.</p>
        <div class="wave-box">
            <div class="bar" style="animation-delay: 0.1s"></div>
            <div class="bar" style="animation-delay: 0.2s"></div>
            <div class="bar" style="animation-delay: 0.3s"></div>
            <div class="bar" style="animation-delay: 0.4s"></div>
            <div class="bar" style="animation-delay: 0.5s"></div>
        </div>
    </div>

    <button class="measure-btn" onclick="startMeasure()">START MEASURING</button>

    <video id="v" style="display:none;" playsinline></video>

    <script>
        let isMeasuring = false;

        async function startMeasure() {
            if (isMeasuring) return;
            isMeasuring = true;
            
            document.getElementById('statusMsg').innerHTML = "Hold steady... scanning blood flow";
            document.getElementById('glowAnim').style.display = 'block';
            
            try {
                // Request camera with Flash
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment', torch: true } 
                });
                
                const video = document.getElementById('v');
                video.srcObject = stream;

                // Simulate pulse detection
                let count = 0;
                let interval = setInterval(() => {
                    count++;
                    // Randomize BPM between 68-75 for the demo
                    let heartRate = Math.floor(Math.random() * (75 - 68 + 1)) + 68;
                    document.getElementById('bpmVal').innerText = heartRate;

                    if (count > 10) {
                        clearInterval(interval);
                        stopMeasure(stream);
                    }
                }, 1000);

            } catch (err) {
                alert("Please enable camera access and ensure your finger covers the lens.");
                isMeasuring = false;
            }
        }

        function stopMeasure(stream) {
            isMeasuring = false;
            document.getElementById('statusMsg').innerText = "Measurement Complete.";
            document.getElementById('glowAnim').style.display = 'none';
            stream.getTracks().forEach(t => t.stop());
        }
    </script>
</body>
</html>
